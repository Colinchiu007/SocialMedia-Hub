version: '3.8'

services:
  socialmedia-hub:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SMH_API_KEY=${SMH_API_KEY:-}
      - SMH_HOST=0.0.0.0
      - SMH_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - socialmedia-network

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - socialmedia-network

networks:
  socialmedia-network:
    driver: bridge

volumes:
  redis-data:
