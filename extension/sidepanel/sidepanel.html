<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialMedia-Hub</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>SocialMedia-Hub</h1>
      <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
    </header>

    <!-- API Key Setup -->
    <div id="apiKeySetup" class="section">
      <h2>API Configuration</h2>
      <input type="password" id="apiKeyInput" placeholder="Enter API Key">
      <button id="saveApiKeyBtn" class="btn">Save Key</button>
      <p id="apiKeyStatus" class="status"></p>
    </div>

    <!-- Current Page Analysis -->
    <div id="pageAnalysis" class="section hidden">
      <h2>Current Page</h2>
      <div id="pageInfo" class="info-box">
        <p id="pageUrl">No page detected</p>
        <p id="pagePlatform">Platform: -</p>
      </div>
      <button id="analyzeBtn" class="btn primary">Analyze Page</button>
    </div>

    <!-- Analysis Results -->
    <div id="analysisResults" class="section hidden">
      <h2>Analysis Results</h2>
      <div id="resultsContent" class="results"></div>
    </div>

    <!-- Quick Actions -->
    <div id="quickActions" class="section">
      <h2>Quick Actions</h2>
      <div class="action-grid">
        <button class="action-btn" data-action="fetchTrending">🔥 Trending</button>
        <button class="action-btn" data-action="fetchUser">👤 User Info</button>
        <button class="action-btn" data-action="fetchVideo">🎬 Video Info</button>
        <button class="action-btn" data-action="search">🔍 Search</button>
      </div>
    </div>

    <!-- History -->
    <div id="history" class="section">
      <h2>Recent Analysis</h2>
      <div id="historyList" class="history-list"></div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Analyzing...</p>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
